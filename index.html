<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Badminton Club</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
  <style>
    [x-cloak] { display: none !important; }

    /* Hidden on screen, shown only when printing */
    @media screen { .print-only { display: none !important; } }

    /* ── Print styles ───────────────────────────────────────── */
    @media print {
      @page { size: A4 landscape; margin: 1.5cm; }
      body * { visibility: hidden; }
      #print-area, #print-area * { visibility: visible; }
      #print-area { position: absolute; inset: 0; }
      .no-print { display: none !important; }
      .print-page-break { page-break-after: always; }
      /* Force background colours (grey sit-out cells) */
      .sitout-cell {
        background-color: #6b7280 !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
    }
  </style>

  <script src="js/csv.js"></script>
  <script src="js/algorithm.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800" x-data="appData()" x-init="init()" x-cloak>

  <!-- ── Toast ─────────────────────────────────────────────────────────── -->
  <div x-show="toast" x-transition
       :class="toast?.type === 'error' ? 'bg-red-600' : 'bg-green-600'"
       class="fixed top-4 right-4 z-50 text-white px-4 py-2 rounded shadow-lg text-sm max-w-xs no-print">
    <span x-text="toast?.msg"></span>
  </div>

  <!-- ── Loading overlay ───────────────────────────────────────────────── -->
  <div x-show="loading" class="fixed inset-0 bg-white/60 z-40 flex items-center justify-center no-print">
    <div class="text-blue-700 text-lg font-medium animate-pulse">Loading…</div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!-- SETUP VIEW                                                          -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <div x-show="view === 'setup'" class="flex items-center justify-center min-h-screen p-4">
    <div class="bg-white rounded-xl shadow p-8 w-full max-w-md">
      <h1 class="text-2xl font-bold text-blue-700 mb-1">Badminton Club</h1>
      <p class="text-sm text-gray-500 mb-6">Connect to your GitHub repository to get started.</p>

      <label class="block text-sm font-medium mb-1">GitHub Username / Org</label>
      <input x-model="cfg.owner" type="text" placeholder="your-username"
             class="w-full border rounded px-3 py-2 mb-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-700">

      <label class="block text-sm font-medium mb-1">Repository Name</label>
      <input x-model="cfg.repo" type="text" placeholder="badminton-club"
             class="w-full border rounded px-3 py-2 mb-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-700">

      <label class="block text-sm font-medium mb-1">Personal Access Token (PAT)</label>
      <input x-model="cfg.pat" type="password" placeholder="ghp_…"
             class="w-full border rounded px-3 py-2 mb-1 text-sm focus:outline-none focus:ring-2 focus:ring-blue-700">
      <p class="text-xs text-gray-400 mb-6">Needs <code>repo</code> scope. Stored in your browser only.</p>

      <button @click="saveConfig()"
              :disabled="!cfg.owner || !cfg.repo || !cfg.pat"
              class="w-full bg-blue-700 text-white rounded px-4 py-2 font-medium disabled:opacity-40">
        Save & Continue
      </button>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!-- HOME VIEW                                                           -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <div x-show="view === 'home'" class="max-w-2xl mx-auto px-4 py-6">

    <!-- Header -->
    <div class="flex items-center justify-between mb-6 no-print">
      <h1 class="text-2xl font-bold text-blue-700">🏸 Badminton Club</h1>
      <button @click="view = 'setup'" class="text-xs text-gray-400 hover:text-gray-600">⚙ Settings</button>
    </div>

    <!-- Session controls -->
    <div class="bg-white rounded-xl shadow p-4 mb-6 no-print" x-data="{ newDate: defaultSessionDate() }">
      <div class="flex flex-col sm:flex-row gap-3 items-center">

        <!-- Open most recent session -->
        <template x-if="mostRecentSession">
          <button @click="openSession(mostRecentSession)"
                  class="text-sm bg-blue-700 text-white rounded px-4 py-2 font-medium whitespace-nowrap">
            Open: <span x-text="formatDate(mostRecentSession)"></span>
          </button>
        </template>

        <!-- Start new session -->
        <div class="flex gap-2 items-center flex-wrap">
          <input type="date" x-model="newDate" class="border rounded px-2 py-2 text-sm">
          <div class="relative group">
            <button @click="startSession(newDate)"
                    :disabled="mostRecentSessionStatus && mostRecentSessionStatus !== 'closed'"
                    :class="(mostRecentSessionStatus && mostRecentSessionStatus !== 'closed') ? 'opacity-40 cursor-not-allowed' : ''"
                    class="text-sm bg-green-600 text-white rounded px-4 py-2 font-medium">
              + New Session
            </button>
            <!-- Tooltip — only visible on hover when session is blocked -->
            <div x-show="mostRecentSessionStatus && mostRecentSessionStatus !== 'closed'"
                 class="absolute bottom-full left-1/2 mb-2 px-2 py-1.5 bg-gray-800 text-white text-xs rounded whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none z-10"
                 style="transform: translateX(-50%)">
              Close the current session first.
              <div class="absolute top-full left-1/2 border-4 border-transparent border-t-gray-800"
                   style="transform: translateX(-50%)"></div>
            </div>
          </div>
        </div>

        <!-- Past sessions -->
        <template x-if="sessionDates.length > 1">
          <select @change="openSession($event.target.value); $event.target.value = ''"
                  class="border rounded px-2 py-2 text-sm text-gray-600">
            <option value="">Past sessions…</option>
            <template x-for="d in sessionDates.slice(1)" :key="d">
              <option :value="d" x-text="formatDate(d)"></option>
            </template>
          </select>
        </template>
      </div>
    </div>

    <!-- Staging dev tools -->
    <template x-if="isStaging">
      <div class="mb-3 no-print flex items-center gap-2 text-xs text-orange-500">
        <span class="px-1.5 py-0.5 bg-orange-100 rounded font-mono font-semibold">STAGING</span>
        <button @click="resetStagingData()" class="underline hover:text-orange-700">
          Reset test data
        </button>
        <span class="text-gray-300">— deletes all sessions, keeps leaderboard</span>
      </div>
    </template>

    <!-- Import / Export CSV -->
    <div class="mb-4 no-print flex gap-4 flex-wrap">
      <label class="inline-block text-sm text-gray-500 hover:text-blue-700 cursor-pointer">
        ⬆ Import leaderboard CSV
        <input type="file" accept=".csv,.txt" @change="importCSV($event)" class="hidden">
      </label>
      <button @click="exportCSV()" class="text-sm text-gray-500 hover:text-blue-700">
        ⬇ Export leaderboard CSV
      </button>
    </div>

    <!-- Leaderboard -->
    <div class="bg-white rounded-xl shadow overflow-hidden">
      <div class="px-4 py-3 border-b flex items-center justify-between">
        <h2 class="font-semibold">Current Leaderboard</h2>
        <span class="text-xs text-gray-400" x-text="leaderboard.length + ' players'"></span>
      </div>
      <div class="divide-y max-h-[70vh] overflow-y-auto">
        <template x-for="(name, i) in leaderboard" :key="name">
          <div class="flex items-center px-4 py-2 text-sm hover:bg-gray-50">
            <span class="w-8 text-gray-400 text-xs" x-text="i + 1"></span>
            <span x-text="name"></span>
          </div>
        </template>
        <template x-if="leaderboard.length === 0 && !loading">
          <div class="px-4 py-8 text-center text-gray-400 text-sm">
            No leaderboard data. Import a CSV or check your GitHub settings.
          </div>
        </template>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!-- SESSION VIEW                                                        -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <div x-show="view === 'session' && session" class="max-w-3xl mx-auto px-4 py-4">

    <!-- Session header -->
    <div class="flex items-center gap-3 mb-4 no-print flex-wrap">
      <button @click="view = 'home'; location.hash = '/'" class="text-gray-400 hover:text-gray-600">← Home</button>
      <h2 class="font-bold text-lg text-blue-700" x-text="session ? formatDate(session.date) : ''"></h2>
      <span class="text-xs px-2 py-0.5 rounded-full"
            :class="{
              'bg-yellow-100 text-yellow-700': session?.status === 'attendance',
              'bg-blue-100 text-blue-700': session?.status === 'boxes_assigned',
              'bg-orange-100 text-orange-700': session?.status === 'in_progress',
              'bg-green-100 text-green-700': session?.status === 'closed',
            }"
            x-text="session?.status?.replace('_', ' ')"></span>

      <!-- Close session button -->
      <template x-if="session?.status === 'in_progress' && allScoresComplete">
        <button @click="closeSession()" class="ml-auto text-sm bg-green-600 text-white rounded px-3 py-1">
          Close Session
        </button>
      </template>
    </div>

    <!-- Tabs -->
    <div class="flex border-b mb-4 no-print">
      <template x-for="[label, num] in [['Attendance', 1], ['Boxes & Results', 2], ['Leaderboard', 3]]" :key="num">
        <button @click="sessionTab = num"
                :class="sessionTab === num
                  ? 'border-b-2 border-blue-700 text-blue-700 font-medium'
                  : 'text-gray-500 hover:text-gray-700'"
                class="px-4 py-2 text-sm -mb-px" x-text="label">
        </button>
      </template>
    </div>

    <!-- ── Tab 1: Attendance ─────────────────────────────────────────── -->
    <div x-show="sessionTab === 1">

      <!-- CSV import in session -->
      <template x-if="session?.status === 'attendance'">
        <div class="mb-3 no-print">
          <label class="inline-block text-xs text-gray-400 hover:text-blue-700 cursor-pointer">
            ⬆ Import new leaderboard CSV
            <input type="file" accept=".csv,.txt" @change="importCSV($event)" class="hidden">
          </label>
        </div>
      </template>

      <!-- Search + Assign Boxes -->
      <div class="flex gap-2 mb-3 no-print items-center">
        <div class="relative flex-1">
          <input type="search" x-model="attendanceSearch"
                 @input="onSearchInput()"
                 @keydown="attendanceKeydown($event)"
                 placeholder="Search players…"
                 autocomplete="off"
                 class="w-full border rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-700"
                 :disabled="session?.status === 'in_progress' || session?.status === 'closed'">
          <span class="absolute right-3 top-2.5 text-gray-400 text-xs"
                x-text="attendingCount + ' attending'"></span>
        </div>
        <template x-if="session?.status === 'attendance' || session?.status === 'boxes_assigned'">
          <button @click="assignBoxes()"
                  :disabled="attendingCount < 4"
                  class="bg-blue-700 text-white text-sm rounded px-4 py-2 whitespace-nowrap disabled:opacity-40">
            <span x-text="session?.status === 'boxes_assigned' ? 'Reassign ↺' : 'Assign Boxes →'"></span>
          </button>
        </template>
      </div>

      <!-- Player list -->
      <div class="bg-white rounded-xl shadow divide-y mb-4">
        <template x-for="(p, pi) in filteredPlayers" :key="p.name">
          <div @click="toggleAttendance(p.name); clearSearch()"
               :class="{
                 'bg-green-50': isAttending(p.name),
                 'bg-blue-50 player-row-highlighted': pi === highlightIdx
               }"
               class="flex items-center px-4 py-3 text-sm cursor-pointer hover:bg-gray-50 select-none">
            <span class="w-8 text-gray-400 text-xs" x-text="p.rank"></span>
            <span class="flex-1" x-text="p.name"></span>
            <span x-show="isAttending(p.name)" class="text-green-500 text-lg">✓</span>
          </div>
        </template>

        <!-- No match → offer to add player -->
        <template x-if="searchHasNoMatch && !showAddPlayer">
          <div class="px-4 py-3">
            <p class="text-sm text-gray-400 mb-2">No match for "<span x-text="attendanceSearch"></span>"</p>
            <button @click="prepareAddPlayer()"
                    class="text-sm text-blue-700 font-medium">
              + Add "<span x-text="attendanceSearch"></span>" as new player
            </button>
          </div>
        </template>

        <!-- Add player form -->
        <template x-if="showAddPlayer">
          <div class="px-4 py-3 bg-blue-50">
            <p class="text-sm font-medium mb-2">Add new player</p>
            <div class="flex gap-2 flex-wrap items-end">
              <div>
                <label class="text-xs text-gray-500">Name</label>
                <input x-model="addPlayerName" type="text"
                       class="block border rounded px-2 py-1.5 text-sm w-48 focus:ring-2 focus:ring-blue-700 focus:outline-none">
              </div>
              <div>
                <label class="text-xs text-gray-500">Insert at position</label>
                <input x-model="addPlayerPos" type="number" :min="1" :max="leaderboard.length + 1"
                       class="block border rounded px-2 py-1.5 text-sm w-20 focus:ring-2 focus:ring-blue-700 focus:outline-none">
              </div>
              <button @click="confirmAddPlayer()"
                      class="bg-blue-700 text-white text-sm rounded px-3 py-1.5">Add & Mark Attending</button>
              <button @click="showAddPlayer = false; attendanceSearch = ''"
                      class="text-gray-400 text-sm px-2 py-1.5">Cancel</button>
            </div>
          </div>
        </template>
      </div>

    </div>

    <!-- ── Tab 2: Boxes & Results ─────────────────────────────────────── -->
    <div x-show="sessionTab === 2">

      <!-- Print all button -->
      <div class="flex justify-between items-center mb-4 no-print">
        <span class="text-sm text-gray-500"
              x-text="session?.boxes?.length + ' box(es)'"></span>
        <button @click="printBoxes()" class="text-sm text-blue-700 font-medium">🖨 Print All Sheets</button>
      </div>

      <template x-if="!session?.boxes?.length">
        <p class="text-center text-gray-400 py-10 text-sm">
          Go to Attendance and assign boxes first.
        </p>
      </template>

      <!-- ── PRINT AREA ─────────────────────────────────────────────── -->
      <div id="print-area">
        <template x-for="(box, bi) in (session?.boxes ?? [])" :key="bi">
          <div :class="bi < (session?.boxes?.length - 1) ? 'print-page-break' : ''">

            <!-- Box score sheet — print only -->
            <div class="print-only mb-8">

              <!-- Box header: circled number + label -->
              <div class="flex items-center gap-3 mb-3">
                <div class="flex items-center justify-center font-bold text-xl text-gray-800"
                     style="width:2.4rem;height:2.4rem;border-radius:50%;border:2.5px solid #1f2937;"
                     x-text="bi + 1"></div>
                <span class="text-xl font-bold text-gray-800">Box <span x-text="bi + 1"></span></span>
              </div>

              <!-- Table 1: Match results -->
              <table class="w-full border-collapse border-2 border-gray-700" style="table-layout:fixed">
                <colgroup>
                  <col style="width:26%">
                  <template x-for="p in box.players" :key="p"><col></template>
                </colgroup>
                <thead>
                  <!-- Row A: disambiguated player names -->
                  <tr>
                    <th class="border-2 border-gray-700 bg-gray-100 text-left px-3 py-3 text-sm font-bold">Pairing</th>
                    <template x-for="(name, pi) in box.players" :key="pi">
                      <th class="border-2 border-gray-700 text-center px-2 py-3 font-bold text-sm leading-tight"
                          x-text="boxDisplayName(box, pi)"></th>
                    </template>
                  </tr>
                  <!-- Row B: player numbers (1–N) — top padding acts as visual gap -->
                  <tr>
                    <td class="border-2 border-gray-700 px-3 pt-3 pb-1 text-xs text-gray-400"></td>
                    <template x-for="(name, pi) in box.players" :key="pi">
                      <td class="border-2 border-gray-700 text-center pt-3 pb-1 font-bold text-sm"
                          x-text="pi + 1"></td>
                    </template>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="(match, mi) in box.matches" :key="mi">
                    <tr>
                      <td class="border-2 border-gray-700 px-3 py-5 font-bold text-sm leading-tight"
                          x-text="(match.pair1.map(i=>i+1).join(' & ') + '  v  ' + match.pair2.map(i=>i+1).join(' & '))"></td>
                      <template x-for="(name, pi) in box.players" :key="pi">
                        <td :class="isSitout(bi, mi, pi) ? 'sitout-cell bg-gray-400' : ''"
                            class="border-2 border-gray-700 text-center py-5"></td>
                      </template>
                    </tr>
                  </template>
                </tbody>
              </table>

              <!-- Whitespace between sections -->
              <div style="height:14px"></div>

              <!-- Table 2: Scoring -->
              <table class="w-full border-collapse border-2 border-gray-700" style="table-layout:fixed">
                <colgroup>
                  <col style="width:26%">
                  <template x-for="p in box.players" :key="p"><col></template>
                </colgroup>
                <tbody>
                  <tr>
                    <td class="border-2 border-gray-700 px-3 py-4 font-bold text-sm leading-tight">Matches Won<br>&nbsp;</td>
                    <template x-for="p in box.players" :key="p">
                      <td class="border-2 border-gray-700 py-4"></td>
                    </template>
                  </tr>
                  <tr>
                    <td class="border-2 border-gray-700 px-3 py-4 font-bold text-sm leading-tight">Games<br>(Won − Lost)</td>
                    <template x-for="p in box.players" :key="p">
                      <td class="border-2 border-gray-700 py-4"></td>
                    </template>
                  </tr>
                  <tr>
                    <td class="border-2 border-gray-700 px-3 py-4 font-bold text-sm leading-tight">Points<br>(For − Against)</td>
                    <template x-for="p in box.players" :key="p">
                      <td class="border-2 border-gray-700 py-4"></td>
                    </template>
                  </tr>
                </tbody>
              </table>

              <!-- Whitespace -->
              <div style="height:14px"></div>

              <!-- Table 3: Final Placing -->
              <table class="w-full border-collapse border-2 border-gray-700" style="table-layout:fixed">
                <colgroup>
                  <col style="width:26%">
                  <template x-for="p in box.players" :key="p"><col></template>
                </colgroup>
                <tbody>
                  <tr>
                    <td class="border-2 border-gray-700 px-3 py-4 font-bold text-sm">Final Placing</td>
                    <template x-for="p in box.players" :key="p">
                      <td class="border-2 border-gray-700 py-4"></td>
                    </template>
                  </tr>
                </tbody>
              </table>
            </div>

            <!-- Digital score entry (screen only) -->
            <div class="no-print bg-white rounded-xl shadow p-4 mb-8">
              <h3 class="font-semibold mb-3 text-sm"
                  x-text="'Box ' + (bi + 1) + ' — Score Entry'"></h3>

              <template x-for="(match, mi) in box.matches" :key="mi">
                <div class="mb-5 pb-5 border-b last:border-b-0">
                  <p class="text-xs text-gray-400 font-medium mb-2">Match <span x-text="mi+1"></span></p>

                  <!-- Pair names + vs — same 3-col structure as set rows -->
                  <div class="flex items-baseline mb-2">
                    <div class="flex-1 flex justify-end pr-3">
                      <span class="font-semibold text-sm text-gray-800"
                            x-text="pairLabel(box, match.pair1)"></span>
                    </div>
                    <div class="w-8 text-center shrink-0">
                      <span class="text-gray-400 text-xs font-medium">vs</span>
                    </div>
                    <div class="flex-1 pl-3">
                      <span class="font-semibold text-sm text-gray-800"
                            x-text="pairLabel(box, match.pair2)"></span>
                    </div>
                  </div>

                  <!-- One row per set: Set label sits right of pair1 name, left of its input -->
                  <template x-for="setIdx in [0, 1, 2]" :key="setIdx">
                    <div class="flex items-center mb-1.5"
                         x-show="setIdx < 2 || (match.sets[0]?.length && match.sets[1]?.length)">
                      <div class="flex-1 flex justify-end items-center gap-2 pr-3">
                        <span class="text-xs text-gray-400 shrink-0">Set <span x-text="setIdx + 1"></span></span>
                        <input type="number" min="0" max="99"
                               :value="match.sets[setIdx]?.[0] ?? ''"
                               @change="setScore(bi, mi, setIdx, 0, $event.target.value); saveScores()"
                               :disabled="session.status === 'closed'"
                               class="w-14 border rounded px-2 py-1.5 text-sm text-center focus:ring-2 focus:ring-blue-700 focus:outline-none">
                      </div>
                      <div class="w-8 text-center shrink-0">
                        <span class="text-gray-300 text-sm">–</span>
                      </div>
                      <div class="flex-1 pl-3">
                        <input type="number" min="0" max="99"
                               :value="match.sets[setIdx]?.[1] ?? ''"
                               @change="setScore(bi, mi, setIdx, 1, $event.target.value); saveScores()"
                               :disabled="session.status === 'closed'"
                               class="w-14 border rounded px-2 py-1.5 text-sm text-center focus:ring-2 focus:ring-blue-700 focus:outline-none">
                      </div>
                    </div>
                  </template>

                </div>
              </template>

              <!-- Box standings (auto-computed) -->
              <template x-if="box.matches.some(m => m.sets && m.sets.length > 0)">
                <div class="mt-3">
                  <p class="text-xs font-semibold text-gray-500 mb-2 uppercase tracking-wide">Standings</p>
                  <div class="divide-y rounded border overflow-hidden">
                    <template x-for="s in getBoxStandings(bi)" :key="s.name">
                      <div class="flex items-center px-3 py-2 text-sm">
                        <span class="w-6 font-bold text-gray-400 text-xs" x-text="s.placing + '.'"></span>
                        <span class="flex-1" x-text="s.name"></span>
                        <span class="text-xs text-gray-400"
                              x-text="s.matchesWon + 'W  ' + (s.setsWon-s.setsLost < 0 ? '' : '+') + (s.setsWon-s.setsLost) + 'G  ' + (s.pointsFor-s.pointsAgainst < 0 ? '' : '+') + (s.pointsFor-s.pointsAgainst) + 'P'"></span>
                      </div>
                    </template>
                  </div>
                </div>
              </template>
            </div>

          </div>
        </template>
      </div>

      <!-- Close session -->
      <div class="no-print mt-4 flex justify-end gap-3">
        <template x-if="session?.status === 'in_progress' && allScoresComplete">
          <button @click="closeSession()" class="bg-green-600 text-white text-sm rounded px-5 py-2">
            Close Session & Update Leaderboard
          </button>
        </template>
        <template x-if="session?.status === 'in_progress' && !allScoresComplete">
          <p class="text-xs text-gray-400 self-center">Enter all scores to close the session.</p>
        </template>
      </div>
    </div>

    <!-- ── Tab 3: Updated Leaderboard ──────────────────────────────────── -->
    <div x-show="sessionTab === 3">

      <template x-if="session?.status !== 'closed'">
        <p class="text-center text-gray-400 py-10 text-sm">
          Close the session to see the updated leaderboard.
        </p>
      </template>

      <template x-if="session?.status === 'closed' && session?.leaderboardAfter">
        <div>
          <!-- WhatsApp share -->
          <div class="no-print flex flex-wrap gap-3 mb-4">
            <button @click="shareOnWhatsApp()"
                    class="bg-green-500 text-white text-sm rounded px-4 py-2 font-medium">
              📱 Share on WhatsApp
            </button>
            <template x-if="canEditSession">
              <button @click="enableEditing()"
                      class="text-sm border border-gray-300 rounded px-4 py-2 text-gray-600 hover:bg-gray-50">
                ✏ Edit Session
              </button>
            </template>
          </div>

          <!-- Updated leaderboard with deltas -->
          <div class="bg-white rounded-xl shadow overflow-hidden">
            <div class="px-4 py-3 border-b">
              <h3 class="font-semibold">Updated Leaderboard</h3>
            </div>
            <div class="divide-y max-h-[65vh] overflow-y-auto">
              <template x-for="(name, i) in session.leaderboardAfter" :key="name">
                <div class="flex items-center px-4 py-2 text-sm"
                     :class="session.attendees.includes(name) ? 'bg-white' : 'bg-gray-50 text-gray-400'">
                  <span class="w-8 text-gray-400 text-xs" x-text="i + 1"></span>
                  <span class="flex-1" x-text="name"></span>
                  <span x-show="session.attendees.includes(name)"
                        :class="deltaClass(name)"
                        class="text-xs ml-2 w-8 text-right"
                        x-text="deltaLabel(name)"></span>
                </div>
              </template>
            </div>
          </div>
        </div>
      </template>

      <!-- Re-close controls when in edit mode -->
      <template x-if="session?.status === 'in_progress'">
        <div class="no-print flex gap-3 mt-6 justify-end">
          <button @click="closeWithDiscard()"
                  class="text-sm border border-gray-300 rounded px-4 py-2 text-gray-600">
            Discard Changes
          </button>
          <button @click="closeSessionWithSave()" :disabled="!allScoresComplete"
                  class="text-sm bg-green-600 text-white rounded px-4 py-2 disabled:opacity-40">
            Save & Close
          </button>
        </div>
      </template>
    </div>

  </div>

</body>
</html>
